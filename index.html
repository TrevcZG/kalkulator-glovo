<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glovo Helper v3 - Auto-Transfer</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: #e0e0e0; margin: 0; padding: 15px; }
        .container { max-width: 450px; margin: auto; background: #1e1e1e; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 1px solid #333; }
        
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 1px solid #333; }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; color: #888; border-bottom: 2px solid transparent; font-weight: bold; }
        .tab.active { color: #ffc107; border-bottom: 2px solid #ffc107; }
        
        .content { display: none; }
        .content.active { display: block; }
        
        h2 { color: #ffc107; text-align: center; margin-top: 0; font-size: 1.1em; text-transform: uppercase; }
        .input-group { margin-bottom: 12px; }
        .row { display: flex; gap: 10px; }
        .row .input-group { flex: 1; }
        
        label { display: block; font-size: 0.8em; color: #aaa; margin-bottom: 4px; }
        input { width: 100%; padding: 12px; border: 1px solid #333; border-radius: 8px; background: #2a2a2a; color: white; box-sizing: border-box; font-size: 16px; outline: none; }
        input:focus { border-color: #ffc107; }
        
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 1em; transition: 0.2s; }
        .btn-yellow { background: #ffc107; color: #000; }
        .btn-green { background: #4caf50; color: white; }
        .btn-blue { background: #2196f3; color: white; margin-top: 15px; display: none; }
        
        .result-card { background: #252525; padding: 15px; border-radius: 8px; margin-top: 20px; border-left: 4px solid #ffc107; }
        .alert-kaganiec { background: #442a00; border: 1px solid #ffc107; color: #ffc107; padding: 10px; border-radius: 6px; font-size: 0.85em; margin-bottom: 15px; text-align: center; display: none; }
        .winien-box { background: #1b3321; border-left-color: #4caf50; }
        
        .val { font-size: 1.5em; font-weight: bold; color: #ffc107; }
        .winien-val { color: #4caf50; }
        
        .support-msg { background: #111; padding: 10px; border-radius: 6px; font-size: 0.85em; margin-top: 15px; color: #ccc; border: 1px dashed #555; white-space: pre-wrap; }
        .copy-btn { background: #444; color: white; padding: 8px; font-size: 0.8em; margin-top: 8px; cursor: pointer; border-radius: 4px; border: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <div id="tab-m" class="tab active" onclick="openTab('mnoznik-tab', 'tab-m')">MNOŻNIK</div>
        <div id="tab-k" class="tab" onclick="openTab('kaganiec-tab', 'tab-k')">KAGANIEC</div>
    </div>

    <div id="mnoznik-tab" class="content active">
        <h2>Wylicz mnożnik</h2>
        <div id="m_alert" class="alert-kaganiec">
            ⚠️ <b>Wykryto Kaganiec!</b><br>
            System zapłacił tylko za 8km. Wyliczam mnożnik na podstawie tego limitu.
        </div>
        
        <div class="input-group">
            <label>Kwota zlecenia (zł)</label>
            <input type="number" id="m_kwota" step="0.01" placeholder="9.89">
        </div>
        <div class="input-group">
            <label>Mnożnik ogień (Y)</label>
            <input type="number" id="m_ogien" step="0.01" value="1.00">
        </div>
        <div class="row">
            <div class="input-group">
                <label>Dystans do A (km)</label>
                <input type="number" id="m_distA" step="0.01">
            </div>
            <div class="input-group">
                <label>Dystans do B (km)</label>
                <input type="number" id="m_distB" step="0.01">
            </div>
        </div>
        <button class="btn-yellow" onclick="calcMnoznik()">OBLICZ MNOŻNIK</button>
        
        <div id="res_mnoznik" class="result-card" style="display:none">
            Mnożnik Glovo: <span class="val" id="val_mnoznik">0.00</span>
            <button id="btn_transfer" class="btn-blue" onclick="transferToKorekta()">➜ PRZENIEŚ DO OBLICZENIA KOREKTY</button>
        </div>
    </div>

    <div id="kaganiec-tab" class="content">
        <h2>Kalkulator 8km+</h2>
        <div class="row">
            <div class="input-group">
                <label>Dystans do A (km)</label>
                <input type="number" id="k_distA" step="0.01">
            </div>
            <div class="input-group">
                <label>Dystans do B (km)</label>
                <input type="number" id="k_distB" step="0.01">
            </div>
        </div>
        <div class="input-group">
            <label>Mnożnik ukryty</label>
            <input type="number" id="k_mnoznik" step="0.01">
        </div>
        <div class="input-group">
            <label>Mnożnik ogień (Y)</label>
            <input type="number" id="k_ogien" step="0.01">
        </div>
        <div class="input-group">
            <label>ID Zamówienia (opcjonalnie)</label>
            <input type="text" id="k_id" placeholder="#12345678">
        </div>
        
        <button class="btn-green" onclick="calcKaganiec()">OBLICZ KOREKTĘ</button>

        <div id="res_kaganiec" class="result-card winien-box" style="display:none">
            Realny dystans: <span id="val_total_dist">0</span> km<br>
            <strong>Do odzyskania: <span class="val winien-val" id="val_roznica">0.00</span> zł</strong>
            
            <div class="support-msg" id="msg_text"></div>
            <button class="copy-btn" onclick="copyMsg()">KOPIUJ TREŚĆ</button>
        </div>
    </div>
</div>

<script>
    function openTab(tabName, tabId) {
        let content = document.getElementsByClassName("content");
        for (let i = 0; i < content.length; i++) { content[i].style.display = "none"; }
        
        let tabs = document.getElementsByClassName("tab");
        for (let i = 0; i < tabs.length; i++) { tabs[i].classList.remove("active"); }
        
        document.getElementById(tabName).style.display = "block";
        document.getElementById(tabId).classList.add("active");
    }

    function calcMnoznik() {
        const x = parseFloat(document.getElementById('m_kwota').value);
        const y = parseFloat(document.getElementById('m_ogien').value) || 1;
        const distA = parseFloat(document.getElementById('m_distA').value) || 0;
        const distB = parseFloat(document.getElementById('m_distB').value) || 0;
        const totalDist = distA + distB;
        const baza = 3.50;

        // Jeśli kaganiec, liczymy mnożnik na podstawie 8km
        const distDoObliczen = Math.min(totalDist, 8.00);
        const mnoznikResult = (x / y) / (baza + distDoObliczen);
        
        document.getElementById('val_mnoznik').innerText = mnoznikResult.toFixed(2);
        document.getElementById('res_mnoznik').style.display = 'block';

        if(totalDist > 8) {
            document.getElementById('m_alert').style.display = 'block';
            document.getElementById('btn_transfer').style.display = 'block';
        } else {
            document.getElementById('m_alert').style.display = 'none';
            document.getElementById('btn_transfer').style.display = 'none';
        }
    }

    function transferToKorekta() {
        // Pobierz dane z Mnożnika
        const distA = document.getElementById('m_distA').value;
        const distB = document.getElementById('m_distB').value;
        const ogien = document.getElementById('m_ogien').value;
        const mnoznik = document.getElementById('val_mnoznik').innerText;

        // Wpisz do Korekty
        document.getElementById('k_distA').value = distA;
        document.getElementById('k_distB').value = distB;
        document.getElementById('k_mnoznik').value = mnoznik;
        document.getElementById('k_ogien').value = ogien;

        // Przełącz zakładkę
        openTab('kaganiec-tab', 'tab-k');
        
        // Od razu przelicz korektę
        calcKaganiec();
    }

    function calcKaganiec() {
        const distA = parseFloat(document.getElementById('k_distA').value) || 0;
        const distB = parseFloat(document.getElementById('k_distB').value) || 0;
        const mnoz = parseFloat(document.getElementById('k_mnoznik').value) || 1;
        const ogien = parseFloat(document.getElementById('k_ogien').value) || 1;
        const orderId = document.getElementById('k_id').value || "[ID]";
        
        const totalDist = distA + distB;
        const baza = 3.50;

        if(totalDist <= 8) {
            alert("Suma km to " + totalDist.toFixed(2) + ". Brak kagańca.");
            return;
        }

        const stawkaPrawidlowa = (baza + totalDist) * mnoz * ogien;
        const stawkaKaganiec = (baza + 8) * mnoz * ogien;
        const roznica = stawkaPrawidlowa - stawkaKaganiec;

        document.getElementById('val_total_dist').innerText = totalDist.toFixed(2);
        document.getElementById('val_roznica').innerText = roznica.toFixed(2);
        
        const msg = `Dzień dobry, proszę o korektę zarobków dla zamówienia ${orderId}. Łączny dystans (A+B) wyniósł ${totalDist.toFixed(2)} km (Punkt A: ${distA} km, Punkt B: ${distB} km). System naliczył stawkę tylko do limitu 8 km. Proszę o wyrównanie niedopłaty w wysokości ${roznica.toFixed(2)} zł. Pozdrawiam.`;
        
        document.getElementById('msg_text').innerText = msg;
        document.getElementById('res_kaganiec').style.display = 'block';
    }

    function copyMsg() {
        navigator.clipboard.writeText(document.getElementById('msg_text').innerText);
        alert("Skopiowano gotową wiadomość!");
    }
</script>
</body>
</html>
